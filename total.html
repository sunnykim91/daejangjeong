<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>대장정 — 총력전(토탈맵)</title>
<style>
  :root { --gold:#b8860b; --gold-lt:#e8c873; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { margin:0; height:100%; background:#0b1008; overflow:hidden; }
  body { font-family:"Gungsuh","Batang","Apple SD Gothic Neo",serif; color:#e8e0d0; user-select:none; }
  .stage { position:relative; width:100vw; height:100vh; max-width:1200px; margin:0 auto; }
  canvas { position:absolute; inset:0; width:100%; height:100%; display:block; cursor:crosshair;
    image-rendering:pixelated; image-rendering:crisp-edges; }
  .home { position:absolute; top:10px; left:12px; z-index:7; text-decoration:none; font-size:12px; color:#2c2012;
    background:linear-gradient(#f0e0b6,#cdae78); border:2px solid #2c2012; border-radius:4px; padding:5px 12px; box-shadow:2px 2px 0 rgba(20,14,6,.55); }
  .hud { position:absolute; top:8px; left:50%; transform:translateX(-50%); z-index:6; display:flex; gap:18px; align-items:center;
    background:rgba(14,20,12,.8); border:2px solid #2c2012; border-radius:6px; padding:6px 16px; box-shadow:2px 2px 0 rgba(0,0,0,.5); }
  .hud .s { text-align:center; font-family:"Courier New",monospace; }
  .hud .s .nm { font-size:11px; letter-spacing:1px; } .hud .p .nm{ color:#7fb0e8; } .hud .e .nm{ color:#e89090; }
  .hud .s .c { font-size:18px; font-weight:bold; }
  .panel { position:absolute; bottom:0; left:0; right:0; z-index:6; background:linear-gradient(rgba(14,20,12,0),rgba(14,20,12,.92));
    padding:12px; text-align:center; }
  .panel .tip { font-size:13px; color:#b8c0a8; text-shadow:1px 1px 0 rgba(0,0,0,.6); }
  .panel .tip b { color:var(--gold-lt); }
  .ctrls { position:absolute; bottom:14px; right:14px; z-index:7; display:flex; gap:6px; }
  .mmwrap { position:absolute; bottom:56px; right:14px; z-index:7; border:2px solid #2c2012; border-radius:4px;
    background:rgba(10,14,8,.85); box-shadow:2px 2px 0 rgba(0,0,0,.5); padding:3px; line-height:0; }
  #mm { position:static; inset:auto; width:190px; height:auto; display:block; image-rendering:pixelated; cursor:pointer; }
  /* 장수 정보 패널 (삼국지7풍 액자) */
  /* 장수 정보 패널 — 삼국지7 무장 카드 톤(양피지·청동 액자, 편성 팝업과 통일) */
  .ofc { position:absolute; left:12px; bottom:14px; z-index:7; width:244px; display:none;
    background:linear-gradient(#e8d7af,#c8ad78); border:2px solid #4a3418; border-radius:5px;
    box-shadow:3px 3px 0 rgba(0,0,0,.5); padding:9px 11px 10px; }
  .ofc::before { content:""; position:absolute; inset:3px; border:1px solid rgba(120,80,30,.5); border-radius:3px; pointer-events:none; }
  .ofc.show { display:block; }
  .ofc .top { display:flex; gap:10px; align-items:center; }
  .ofc .medal { width:54px; height:54px; flex:0 0 54px; background:linear-gradient(#a6c4e2,#6a6558); border:2px solid #7a5a2e; border-radius:3px;
    box-shadow:inset 0 0 0 2px #d9b24a, 2px 2px 0 rgba(0,0,0,.4); display:flex; align-items:center; justify-content:center; }
  .ofc .medal img { width:48px; height:48px; image-rendering:pixelated; }
  .ofc .nm { font-family:"Batang",serif; font-size:17px; color:#26190a; font-weight:bold; letter-spacing:1px; }
  .ofc .meta { font-size:11px; color:#6a4e24; margin-top:2px; } .ofc .stars { color:#b8860b; letter-spacing:-1px; }
  .ofc .stats { margin-top:7px; }
  .ofc .st { display:flex; align-items:center; gap:5px; font-size:10px; margin:2px 0; }
  .ofc .st .l { width:28px; color:#5a4020; } .ofc .st .n { width:20px; text-align:right; font-family:"Courier New",monospace; color:#26190a; font-weight:bold; }
  .ofc .st .b { flex:1; height:7px; background:#3a2c16; box-shadow:inset 1px 1px 0 rgba(0,0,0,.5); } .ofc .st .f { height:100%; }
  .ofc .foot { margin-top:8px; border-top:1px solid #a5843e; padding-top:6px; font-size:11px; color:#3a2a12; display:flex; justify-content:space-between; }
  .ofc .foot b { color:#7c2e2e; }
  .ofc .live { margin-top:7px; font-size:11px; color:#3a2a12; }
  .ofc .live b { color:#26190a; font-family:"Courier New",monospace; }
  .ofc .mbar { height:6px; background:#3a2c16; margin-top:3px; box-shadow:inset 1px 1px 0 rgba(0,0,0,.5); border:1px solid #7a5a2e; }
  .ofc .mfill { height:100%; width:75%; background:linear-gradient(#8fd66a,#5a9a3a); }
  /* 문양 프레임: 금색 코너 브래킷 (대상은 이미 positioned여야 ::after inset가 먹음) */
  .orn::after { content:""; position:absolute; inset:3px; pointer-events:none;
    background:
      linear-gradient(var(--gold-lt),var(--gold-lt)) left top, linear-gradient(var(--gold-lt),var(--gold-lt)) left top,
      linear-gradient(var(--gold-lt),var(--gold-lt)) right top, linear-gradient(var(--gold-lt),var(--gold-lt)) right top,
      linear-gradient(var(--gold-lt),var(--gold-lt)) left bottom, linear-gradient(var(--gold-lt),var(--gold-lt)) left bottom,
      linear-gradient(var(--gold-lt),var(--gold-lt)) right bottom, linear-gradient(var(--gold-lt),var(--gold-lt)) right bottom;
    background-repeat:no-repeat;
    background-size:9px 2px,2px 9px, 9px 2px,2px 9px, 9px 2px,2px 9px, 9px 2px,2px 9px; opacity:.75; }
  /* 인장(印) */
  .seal { width:26px; height:26px; border-radius:4px; background:linear-gradient(#c0392b,#8f2418); border:1px solid #5a1810;
    color:#f4e0c0; font-size:15px; font-weight:bold; display:flex; align-items:center; justify-content:center; font-family:"Batang",serif;
    box-shadow:1px 1px 0 rgba(0,0,0,.5), inset 0 0 0 1px rgba(255,220,180,.25); }
  /* 장수 로스터 바 */
  .roster { position:relative; display:inline-flex; gap:7px; justify-content:center; margin-bottom:9px; padding:6px 9px;
    background:rgba(14,20,12,.62); border:2px solid #2c2012; border-radius:6px; box-shadow:2px 2px 0 rgba(0,0,0,.45); }
  .chip { position:relative; width:52px; padding:3px 3px 4px; cursor:pointer; border:2px solid #2c2012; border-radius:4px;
    background:linear-gradient(#20180e,#160f07); box-shadow:1px 1px 0 rgba(0,0,0,.5); transition:transform .08s; }
  .chip:hover { transform:translateY(-2px); }
  .chip.sel { border-color:var(--gold-lt); box-shadow:0 0 8px rgba(232,200,115,.6),1px 1px 0 rgba(0,0,0,.5); transform:translateY(-3px); }
  .chip img { width:44px; height:44px; display:block; margin:0 auto; image-rendering:pixelated; background:#0f1510; border-radius:2px; }
  .chip .cn { font-size:9px; text-align:center; color:#e8e0d0; margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .chip .hp { height:3px; background:#14100a; margin-top:2px; box-shadow:inset 1px 1px 0 rgba(0,0,0,.6); } .chip .hf { height:100%; width:100%; background:#8fd66a; }
  .chip.dead { opacity:.4; filter:grayscale(1); cursor:default; }
  .chip.dead::after { content:"✕"; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:#e05050; font-size:22px; }
  .chip .rt { position:absolute; top:1px; right:3px; font-size:11px; color:#e0a050; text-shadow:0 0 3px #000; }
  .chip .loc { font-size:8px; text-align:center; color:#b9c0a8; margin-top:1px; letter-spacing:1px; }
  .box { position:relative; }
  .box .bxtop { font-size:15px; letter-spacing:10px; color:#7c2e2e; margin-bottom:6px; font-weight:bold; font-family:"Batang",serif; }
  .box .seal { position:absolute; top:-12px; right:-12px; transform:rotate(8deg); }
  /* 출진 편성 팝업 */
  /* 삼국지7 명령창 톤 편성 팝업 */
  .box.sortie { min-width:392px; max-width:420px; padding:0; overflow:hidden; }
  .sortie .stitle { display:flex; align-items:center; justify-content:center; gap:10px; padding:9px 12px;
    background:linear-gradient(#2c1e12,#170f08); border-bottom:2px solid var(--gold);
    color:#f0e0b0; font-family:"Batang",serif; font-size:18px; letter-spacing:5px; font-weight:bold; text-shadow:1px 1px 0 rgba(0,0,0,.6); }
  .sortie .stitle .seal { position:static; transform:none; width:24px; height:24px; font-size:14px; }
  .sortie .sbody { display:flex; gap:12px; padding:13px 14px 6px; }
  .sortie .sleft { width:118px; flex:0 0 118px; text-align:center; }
  .sortie .sPortrait { width:104px; height:104px; margin:0 auto; background:linear-gradient(#a6c4e2,#6a6558);
    border:2px solid #7a5a2e; box-shadow:inset 0 0 0 2px #d9b24a, 2px 2px 0 rgba(0,0,0,.45); }
  .sortie .sPortrait img { width:100px; height:100px; image-rendering:pixelated; }
  .sortie .sOfcName { font-family:"Batang",serif; font-weight:bold; font-size:17px; color:#26190a; margin-top:6px; letter-spacing:1px; }
  .sortie .sStats { margin-top:6px; }
  .sortie .sStats .st { display:flex; align-items:center; gap:4px; font-size:10px; margin:2px 0; }
  .sortie .sStats .st .l { width:26px; text-align:right; color:#5a4020; }
  .sortie .sStats .st .b { flex:1; height:6px; background:#3a2c16; box-shadow:inset 1px 1px 0 rgba(0,0,0,.5); } .sortie .sStats .st .f { height:100%; }
  .sortie .sStats .st .n { width:18px; text-align:right; font-family:"Courier New",monospace; color:#26190a; font-weight:bold; }
  .sortie .sSkill { margin-top:6px; font-size:11px; color:#7c2e2e; font-weight:bold; line-height:1.4; }
  .sortie .sright { flex:1; display:flex; flex-direction:column; min-width:0; }
  .sortie .sPool { font-size:12px; color:#3a2a12; margin-bottom:7px; } .sortie .sPool b { color:#7c2e2e; font-family:"Courier New",monospace; }
  .sortie .sGens { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:9px; }
  .sortie .gchip { width:40px; padding:2px; cursor:pointer; border:2px solid #7a5a2e; background:linear-gradient(#efe0b6,#d3b985); box-shadow:1px 1px 0 rgba(0,0,0,.35); }
  .sortie .gchip img { width:34px; height:34px; display:block; margin:0 auto; image-rendering:pixelated; }
  .sortie .gchip.sel { border-color:#7c2e2e; box-shadow:0 0 6px rgba(124,46,46,.6); }
  .sortie .scmd { display:flex; align-items:center; gap:8px; margin:6px 0; font-size:13px; color:#26190a;
    padding:5px 8px; background:rgba(90,64,30,.14); border:1px solid #b09250; }
  .sortie .scmd .cl { width:32px; color:#5a4020; font-weight:bold; }
  .sortie .scmd input[type=range] { flex:1; accent-color:#7c2e2e; min-width:0; }
  .sortie .scmd b { min-width:58px; text-align:right; font-family:"Courier New",monospace; color:#7c2e2e; }
  .sortie .scmd .sbtn { padding:3px 14px; }
  .sortie .scmd #soFormHint { flex:1; text-align:right; font-size:11px; color:#5a4020; }
  .sortie .row { padding:4px 14px 15px; }
  .sortie .cmdgo { background:linear-gradient(#efc866,#b8860b); border-color:#5a3a10; color:#26190a; font-weight:bold; padding:8px 30px; letter-spacing:4px; font-family:"Batang",serif; }
  /* 장비 슬롯 */
  .eqslot { margin:5px 0; padding:5px 8px; background:rgba(90,64,30,.14); border:1px solid #b09250; }
  .eqslot .sl { font-size:11px; color:#5a4020; font-weight:bold; margin-bottom:3px; }
  .eqslot .opts { display:flex; gap:5px; flex-wrap:wrap; }
  .eqslot .opt { font-size:11px; padding:3px 8px; border:1px solid #7a5a2e; background:linear-gradient(#efe0b6,#d3b985); color:#2a1c0a; cursor:pointer; border-radius:3px; }
  .eqslot .opt.on { border-color:#7c2e2e; background:linear-gradient(#efc866,#d2a24a); font-weight:bold; }
  /* 일기토 컷인 */
  .duelcut { position:absolute; top:66px; left:50%; transform:translateX(-50%); z-index:8; display:none; align-items:center; gap:14px;
    padding:8px 18px; background:linear-gradient(rgba(34,12,12,.93),rgba(20,8,8,.93)); border:2px solid var(--gold); border-radius:6px; box-shadow:3px 3px 0 rgba(0,0,0,.55); }
  .duelcut.show { display:flex; }
  .duelcut .med { width:46px; height:46px; border:2px solid var(--gold); border-radius:4px; background:#0f1510; display:flex; align-items:center; justify-content:center; }
  .duelcut .med img { width:42px; height:42px; image-rendering:pixelated; }
  .duelcut .who { font-size:11px; text-align:center; margin-top:3px; font-family:"Batang",serif; }
  .duelcut .vs { font-family:"Batang",serif; font-size:20px; font-weight:bold; letter-spacing:2px; color:#e8c873; text-shadow:0 0 9px rgba(232,200,115,.7); white-space:nowrap; }
  .btn { padding:8px 12px; border-radius:4px; cursor:pointer; font-family:inherit; font-size:14px; color:#2c2012;
    border:2px solid #2c2012; background:linear-gradient(#f0e0b6,#cdae78); box-shadow:2px 2px 0 rgba(20,14,6,.55); }
  .btn:active { transform:translate(1px,1px); box-shadow:1px 1px 0 rgba(20,14,6,.55); }
  .overlay { position:absolute; inset:0; background:rgba(8,10,6,.82); display:none; align-items:center; justify-content:center; z-index:20; }
  .overlay.show { display:flex; }
  .box { background:linear-gradient(#e8d7af,#c2a878); border:3px solid var(--gold); border-radius:8px; padding:24px 30px;
    text-align:center; max-width:340px; color:#2c2012; box-shadow:4px 4px 0 rgba(0,0,0,.5); }
  .box h2 { margin:0; font-size:30px; letter-spacing:6px; }
  .box .row { margin-top:14px; display:flex; gap:8px; justify-content:center; }
  /* 턴제 일기토 모달 */
  .duelbox { background:linear-gradient(#2a1e12,#160f08); border:3px solid var(--gold); border-radius:10px; padding:16px 18px; width:min(560px,94vw);
    box-shadow:0 0 40px rgba(0,0,0,.7); color:#e8e0d0; }
  .dhead { text-align:center; font-family:"Batang",serif; font-size:22px; letter-spacing:6px; color:var(--gold-lt); margin-bottom:12px; text-shadow:0 0 10px rgba(232,200,115,.5); }
  .dfighters { display:flex; align-items:center; gap:8px; }
  .df { flex:1; text-align:center; }
  .dvs { font-family:"Batang",serif; font-size:20px; color:var(--gold-lt); flex:0 0 34px; }
  .dpor { width:72px; height:72px; margin:0 auto 5px; background:linear-gradient(#a6c4e2,#6a6558); border:2px solid #7a5a2e; box-shadow:inset 0 0 0 2px #d9b24a; }
  .dpor.ee { background:linear-gradient(#e0a89f,#6a6558); } .dpor img { width:68px; height:68px; image-rendering:pixelated; }
  .dnm { font-family:"Batang",serif; font-size:16px; font-weight:bold; }
  .dmeta { font-size:10px; color:#a89466; margin:1px 0 4px; }
  .dbar { height:9px; background:#1a1206; border:1px solid #5a4020; margin:0 6px; } .dhp { height:100%; transition:width .3s; }
  .dnum { font-family:"Courier New",monospace; font-size:11px; margin-top:2px; }
  .dmor { font-size:11px; color:#c9bd98; margin-top:2px; } .dstat { font-size:10px; color:#e0a050; margin-top:2px; }
  .dlog { height:96px; overflow-y:auto; background:rgba(10,8,5,.6); border:1px solid #4a3418; border-radius:4px; margin:12px 0; padding:6px 9px; font-size:11px; line-height:1.6; }
  .dlog .lg.kill,.dlog .lg.rout,.dlog .lg.end { color:#ff9a6a; } .dlog .lg.attack{color:#e8e0d0;} .dlog .lg.rally,.dlog .lg.guard{color:#8fd66a;}
  .dlog .lg.stratagem,.dlog .lg.dot{color:#e0a050;} .dlog .lg.round{color:var(--gold-lt);text-align:center;} .dlog .lg.info{color:#9aa08a;}
  .duelActs { display:flex; gap:6px; justify-content:center; flex-wrap:wrap; }
  .dbtn { cursor:pointer; border:2px solid var(--ink,#2c2012); border-radius:5px; padding:7px 10px; min-width:74px; text-align:center;
    background:linear-gradient(#f0e0b6,#cdae78); color:#2c2012; box-shadow:2px 2px 0 rgba(20,14,6,.5); }
  .dbtn:hover { background:linear-gradient(#f7ecc8,#d8bb86); } .dbtn:active { transform:translate(1px,1px); box-shadow:1px 1px 0 rgba(20,14,6,.5); }
  .dbtn.dis { opacity:.4; cursor:default; filter:grayscale(.6); } .dbtn b { display:block; font-size:14px; } .dbtn small { font-size:9px; color:#6b5436; }
  .dresult { display:none; text-align:center; margin-top:10px; } .dresult .drwin { font-family:"Batang",serif; font-size:26px; font-weight:bold; }
  .dresult .drsub { font-size:12px; color:#c9bd98; margin:4px 0 10px; }
</style>
</head>
<body>
<div class="stage" id="stage">
  <canvas id="cv"></canvas>
  <a class="home" href="index.html">← 메뉴</a>
  <div class="hud orn">
    <div class="s e"><div class="nm">고구려(적)</div><div class="c" id="eCastle">3</div><div style="font-size:10px">성</div></div>
    <div class="seal">志</div>
    <div class="s p"><div class="nm">백제(아군)</div><div class="c" id="pCastle">3</div><div style="font-size:10px">성</div></div>
    <div class="s" id="todBox" style="color:#e8c060"><div class="nm" id="todIcon" style="font-size:16px">☀</div><div class="c" id="todTxt" style="font-size:12px">낮</div></div>
    <div class="s" id="enBox" title="행동력 — 출진에 소모, 시간당 자동 충전"><div class="nm">⚡ 에너지</div><div class="c" id="enTxt" style="font-size:13px">–</div></div>
  </div>
  <div class="panel">
    <div class="roster orn" id="roster"></div>
    <div class="tip" id="tip"><b>장수 클릭</b>=선택 · <b>맵 클릭</b>=진격 · <b>아군 성 클릭</b>=출진/귀환 · <b>C</b>=숙영(밤 휴식→공격력↑) · 밤에 <b>숙영·방심한 적</b>을 기습하면 혼란·와해!</div>
  </div>
  <div class="duelcut" id="duelcut">
    <div><div class="med"><img id="dcA" alt=""></div><div class="who" id="dcAn"></div></div>
    <div class="vs" id="dcVs">⚔ 一騎討 ⚔</div>
    <div><div class="med"><img id="dcB" alt=""></div><div class="who" id="dcBn"></div></div>
  </div>
  <div class="mmwrap orn"><canvas id="mm"></canvas></div>
  <div class="ofc orn" id="ofc">
    <div class="top">
      <div class="medal"><img id="ofcPor" alt=""></div>
      <div><div class="nm" id="ofcNm"></div><div class="meta" id="ofcMeta"></div></div>
    </div>
    <div class="stats" id="ofcStats"></div>
    <div class="foot"><span>진형 <b id="ofcForm"></b></span><span>스킬 <b id="ofcSkill"></b></span></div>
    <div class="live">병력 <b id="ofcTroops"></b>　·　사기 <b id="ofcMoraleN"></b>
      <div class="mbar"><div class="mfill" id="ofcMorale"></div></div>
      <div style="margin-top:5px">피로 <b id="ofcFatigue">0</b>　·　상태 <b id="ofcState">정상</b></div></div>
  </div>
  <div class="ctrls">
    <button class="btn" id="campBtn" style="opacity:.5">🏕 숙영</button>
    <button class="btn" id="muteBtn">🔊</button>
    <button class="btn" id="speedBtn">▶ 1x</button>
    <button class="btn" id="pauseBtn">⏸</button>
  </div>
  <div class="overlay" id="overlay"><div class="box orn">
    <div class="seal">志</div>
    <div class="bxtop">大 長 征</div>
    <h2 id="rTitle"></h2>
    <div class="row"><button class="btn" onclick="location.reload()">다시</button>
      <a class="btn" href="index.html" style="text-decoration:none">메뉴</a></div>
  </div></div>
  <div class="overlay" id="sortieOv"><div class="box orn sortie">
    <div class="stitle"><span class="seal">出</span><span id="soName">출진 편성</span></div>
    <div class="sbody">
      <div class="sleft">
        <div class="sPortrait"><img id="soPor" alt=""></div>
        <div class="sOfcName" id="soOfcName"></div>
        <div class="sStats" id="soStats"></div>
        <div class="sSkill" id="soSkill"></div>
      </div>
      <div class="sright">
        <div class="sPool">주둔 병력 <b id="soPool"></b></div>

<script>

// ── 효과음 (WebAudio 신스, 외부 에셋 없음) ────────────────
const AU=(function(){

  function tone(freq,dur,type,gain,slideTo,delay){ const c=ac(); if(!c)return; const t0=c.currentTime+(delay||0);

    const buf=c.createBuffer(1,n,c.sampleRate),d=buf.getChannelData(0); for(let i=0;i<n;i++)d[i]=Math.random()*2-1;

    boom(){ if(!on)return; noise(0.7,0.4,380); tone(110,0.8,'sine',0.32,38); tone(70,0.9,'sine',0.2,30,0.05); },                                             // 함락: 붕괴
    duel(){ if(!on)return; tone(880,0.16,'square',0.14,1700); noise(0.13,0.14,3200); tone(440,0.3,'sawtooth',0.08,880,0.04); },                              // 일기토 개시
    hit(){ if(!on)return; noise(0.08,0.16,4200); tone(1500,0.07,'square',0.1,650); },                                                                        // 합 타격

// ── 화면 연출(플래시·배너·흔들림) ─────────────────────────
let scFlash=null, scBanner=null, scShake=0, _castleOwner={}, _duelSeen={};

}

    if(scBanner.sub){ ctx.font='14px "Batang",serif'; ctx.fillStyle='rgba(0,0,0,.6)'; ctx.fillText(scBanner.sub,VW/2+1,y+27); ctx.fillStyle='#e8e0d0'; ctx.fillText(scBanner.sub,VW/2,y+26); }

}

// ── 전장의 안개(fog of war) 그리드 ────────────────────────
const FCELL = 30, GW = Math.ceil(MAPW / FCELL), GH = Math.ceil(MAPH / FCELL);

const vis = new Uint8Array(GW * GH);         // 지금 시야에 든 셀
const fogCv = document.createElement('canvas'); fogCv.width = GW; fogCv.height = GH;

  for (const a of world.armies) { if (a.team !== 'player') continue; const cen = armyCentroid(a); if (cen) src.push({ x: cen.x, y: cen.y, r: RTS.AGGRO + 70 }); }
  // 모든 아군 장수(필드)가 시야원 — 장수 위치는 항상 밝게(시야 공유)

  for (const s of src) {

    const gy0 = Math.max(0, ((s.y - s.r) / FCELL) | 0), gy1 = Math.min(GH - 1, ((s.y + s.r) / FCELL) | 0);

    }

  for (const c of world.castles) { const i = gidx(c.x, c.y); if (explored[i]) c.everSeen = true; if (vis[i]) c.seenOwner = c.owner; }
}

// ── 색/스프라이트 (warfield와 동일 규격) ──────────────────
const COL = { player:{보병:'#3f78c0',창병:'#4a86d0',기병:'#5a94e0',궁병:'#6fa0e0'}, enemy:{보병:'#c04848',창병:'#cf5454',기병:'#df6060',궁병:'#e07070'} };
function _rgb(h){ const n=parseInt(h.slice(1),16); return [(n>>16)&255,(n>>8)&255,n&255]; }

// 삼국지풍 동양 군졸: 볏 달린 투구 + 갑주 + 병종별 무기(창/활/방패/기마)
const BODY=["...CC...","..oHHo..",".oHHHHo.",".osssso.","..ssss..",".oaAAao.","oaAAAAao",".oAAAAo.",".oAAAAo.",".obbbbo.",".oAAAAo.","..d..d..","..d..d..","..o..o.."];
const spriteCache={};
function makeUnitSprite(team,troop){
  const c=COL[team], main=c[troop]||c['보병'];
  const PAL={o:'#140d07',s:'#e7c79c',A:main,a:lighten(main,.42),d:darken(main,.5),H:darken(main,.55),C:'#e8c060',b:'#6b4a24',m:'#cdd3da',w:'#7c5a2e'};

    for(let x=0;x<=10;x++){put(x,11,hd);put(x,12,hd);} put(10,10,hl);put(10,9,hl);put(0,10,hd);
    put(1,13,'#0e0a06');put(4,13,'#0e0a06');put(7,13,'#0e0a06');put(10,13,'#0e0a06'); oy=-2; }   // 다리, 기수 위로

  if(troop==='창병'){ put(10,oy+0,PAL.m);put(10,oy+1,PAL.m);put(9,oy+1,PAL.m);put(11,oy+1,PAL.m); for(let y=oy+2;y<=oy+13;y++)put(10,y,PAL.w); }        // 창
  else if(troop==='궁병'){ for(let y=oy+3;y<=oy+10;y++)put(10,y,PAL.w); put(11,oy+4,PAL.w);put(11,oy+9,PAL.w); put(9,oy+3,PAL.m);put(9,oy+10,PAL.m); }   // 활
  else if(troop==='보병'){ for(let y=oy+5;y<=oy+11;y++)put(0,y,PAL.m); put(0,oy+8,'#8a5a2a'); }                                                          // 방패(좌)
  return cnv;
}
function genById(id){ for(const g of ROSTER.player)if(g.id===id)return g; for(const g of ROSTER.enemy)if(g.id===id)return g; return null; }
function genByName(nm){ for(const g of ROSTER.player)if(g.name===nm)return g; for(const g of ROSTER.enemy)if(g.name===nm)return g; return null; }
const PLUMES=['#e05050','#e8c060','#58c070','#5aa0e0','#c060d0','#e8e8e8'];
function genLook(def){
  const eq=(def&&def.equip)||{}, w=itemById(eq.weapon), a=itemById(eq.armor), gl=itemById(eq.gloves), b=itemById(eq.boots);
  let seed=7; if(def)for(const ch of def.id)seed=(seed*31+ch.charCodeAt(0))>>>0;
  return { ac:a?a.look.ac:'#8a8f98', wp:w?w.look.wp:'sword', wc:w?w.look.wc:'#cdd3da',
    gc:gl?gl.look.gc:'#8a6a3a', bc:b?b.look.bc:'#5a3a1c', plume:PLUMES[seed%PLUMES.length], beard:(seed>>3)%3 };
}
function drawGenWeapon(P,wp,wc){
  const wood='#6b4a24', GD='#b8860b';
  if(wp==='spear'){ for(let y=2;y<=20;y++)P(15,y,wood); P(15,0,wc);P(15,1,wc);P(14,2,wc);P(16,2,wc); }
  else if(wp==='glaive'){ for(let y=5;y<=20;y++)P(15,y,wood); P(15,2,wc);P(16,3,wc);P(16,4,wc);P(15,3,wc);P(14,4,wc); }
  else if(wp==='halberd'){ for(let y=1;y<=20;y++)P(15,y,'#5a3a1c'); P(15,0,wc);P(16,0,wc);P(14,1,wc);P(16,1,GD);P(14,3,wc);P(15,2,wc); }
  else if(wp==='bow'){ for(let y=4;y<=17;y++)P(16,y,wood); P(15,4,wood);P(15,17,wood); for(let y=5;y<=16;y++)P(15,y,'#d8cfae'); }
  else { for(let y=4;y<=18;y++)P(15,y,wc); P(15,3,wc); P(14,18,GD);P(16,18,GD);P(15,19,GD); }   // sword
}
function makeGenSprite(team,def){
  const L=genLook(def), tc=COL[team]['기병'], tcl=lighten(tc,.5), tcd=darken(tc,.5);
  const ac=L.ac, acl=lighten(ac,.4), acd=darken(ac,.45), O='#0f0b06', SK='#e7c79c', SKD='#c99f6e', G='#e8c873', GD='#b8860b', BR='#3a2a18';
  const W=18,H=22, cv=document.createElement('canvas'); cv.width=W;cv.height=H; const x=cv.getContext('2d');
  const P=(a,b,col)=>{ if(a<0||b<0||a>=W||b>=H)return; x.fillStyle=col;x.fillRect(a,b,1,1); };
  const box=(x0,y0,x1,y1,col)=>{for(let b=y0;b<=y1;b++)for(let a=x0;a<=x1;a++)P(a,b,col);};
  box(8,0,9,2,L.plume); P(8,0,lighten(L.plume,.35));                                  // 볏
  box(6,3,11,3,O); box(6,4,11,6,tcd); box(6,4,11,4,G); P(6,5,O);P(11,5,O); P(7,4,tcl);  // 투구
  box(7,7,10,10,SK); P(10,7,SKD);P(10,8,SKD);P(10,9,SKD); P(7,8,O);P(9,8,O);           // 얼굴+눈
  if(L.beard===1)box(7,10,10,11,BR); else if(L.beard===2){box(7,10,10,12,BR);P(8,13,BR);P(9,13,BR);}  // 수염
  box(3,13,14,13,tc); box(3,13,3,18,tcd); box(14,13,14,18,tcd);                        // 망토
  box(6,13,11,18,ac); box(6,13,11,13,G); box(6,14,7,17,acl); box(10,14,11,17,acd); box(6,15,11,15,acd); box(6,17,11,17,acd);  // 갑주+찰갑선
  box(4,14,5,17,acd); box(12,14,13,17,acd); box(4,17,5,18,L.gc); box(12,17,13,18,L.gc);// 팔+장갑
  box(6,18,11,18,GD);                                                                  // 허리
  box(6,19,7,21,tcd); box(10,19,11,21,tcd); box(6,21,7,21,L.bc); box(10,21,11,21,L.bc);// 다리+신발
  drawGenWeapon(P,L.wp,L.wc);                                                          // 무기

}
function spriteFor(s){
  if(s.gen){ const def=genById(s.id), sig=def&&def.equip?Object.values(def.equip).join(''):''; const k='G'+s.team+'_'+s.id+'_'+sig;
    if(!spriteCache[k]) spriteCache[k]=makeGenSprite(s.team,def); return spriteCache[k]; }
  const k='U'+s.team+'_'+s.troop; if(!spriteCache[k]) spriteCache[k]=makeUnitSprite(s.team,s.troop); return spriteCache[k];
}
const castleCache={};
// 동양식 읍성: 넓은 성벽 enclosure + 성문 문루(기와지붕) + 각루(모서리 기와 망루) + 여장
function makeCastle(team,capital){
  const key=team+(capital?'C':''); if(castleCache[key])return castleCache[key];
  const trim = team==='player'?'#4f7db8':(team==='enemy'?'#b84a4a':'#7a7a6a');
  const trimD= team==='player'?'#2a4f7c':(team==='enemy'?'#7c2e2e':'#4f4f44');
  const flag = team==='player'?'#3f6fb0':(team==='enemy'?'#b33b3b':'#8a8a7a');
  const st='#cabf9c', std='#a89c74', sts='#6f6748', ground='#b7a97e', dark='#241a10', door='#3a2a16', pole='#4a361f';
  const rt='#4a5568', rtl='#727f93', rtd='#2e3949', gold='#d9b24a', goldD='#a6812a';   // 기와
  const W=24,H=18; const c=document.createElement('canvas'); c.width=W;c.height=H; const g=c.getContext('2d');
  const P=(x,y,col)=>{ if(x<0||y<0||x>=W||y>=H)return; g.fillStyle=col; g.fillRect(x,y,1,1); };
  const box=(x0,y0,x1,y1,col)=>{for(let y=y0;y<=y1;y++)for(let x=x0;x<=x1;x++)P(x,y,col);};
  const stone=(x0,y0,x1,y1)=>{for(let y=y0;y<=y1;y++)for(let x=x0;x<=x1;x++)P(x,y,(x+y)%2?st:std);};
  // 기와지붕(중앙 폭 rx0..rx1, 처마행 ey, 층수 tiers) — 용마루+처마 치켜올림
  const roof=(rx0,rx1,ey,ridgeCol)=>{
    box(rx0,ey,rx1,ey,rt); P(rx0-1,ey,rt);P(rx1+1,ey,rt); P(rx0-1,ey-1,rt);P(rx1+1,ey-1,rt);   // 처마+치켜
    box(rx0+1,ey-1,rx1-1,ey-1,rt);
    box(rx0+2,ey-2,rx1-2,ey-2,ridgeCol||rtl);                                                   // 용마루
    for(let x=rx0;x<=rx1;x+=2)P(x,ey,rtd);                                                       // 기왓골 음영
  };
  // 성 안마당(성벽 뒤 지면)
  stone(2,9,21,16);

  box(1,10,22,16,std); box(1,10,1,16,sts); box(22,10,22,16,sts); box(1,17,22,17,sts);

const mm=$('mm'), mmx=mm.getContext('2d');

  for(let gy=0;gy<GH;gy++)for(let gx=0;gx<GW;gx++){ const i=gy*GW+gx; if(!explored[i])continue;
    mmx.fillStyle=vis[i]?'#3c4c26':'#1c2612'; mmx.fillRect((gx*FCELL*sx)|0,(gy*FCELL*sy)|0,cw,ch); }
  // 성

const keys={};
function panStep(dt){ const sp=520*dt; let dx=0,dy=0;
  if(keys['ArrowLeft']||keys['a'])dx-=sp; if(keys['ArrowRight']||keys['d'])dx+=sp;
  if(keys['ArrowUp']||keys['w'])dy-=sp; if(keys['ArrowDown']||keys['s'])dy+=sp;
  if(edge.x)dx+=edge.x*sp; if(edge.y)dy+=edge.y*sp;
  cam.x=Math.max(0,Math.min(MAPW-VW,cam.x+dx)); cam.y=Math.max(0,Math.min(MAPH-VH,cam.y+dy));
}
// 적 AI — 무장이 주기적으로 가장 가까운 아군 성으로 진격(삼국지7 장수 중심 침공)
let aiT=2;
function enemyAI(dt){ aiT-=dt; if(aiT>0)return; aiT=4+Math.random()*2;
  const pc=world.castles.filter(c=>c.owner==='player'); if(!pc.length)return;
  // 출진: 병력 충분한 적 성에서 주둔 장수 출진
  for(const c of world.castles){ if(c.owner!=='enemy'||!c.garrison.length)continue;
    if(c.troops>=1800 && Math.random()<0.55){
      const rec=c.garrison[0], dots=Math.min(Math.floor(c.troops/100), 16+((Math.random()*8)|0));
      const army=RTS.sortie(world,c.id,rec.def.id,dots,'방진');
      if(army){ let best=null,bd=Infinity; for(const p of pc){const d=(p.x-c.x)**2+(p.y-c.y)**2; if(d<bd){bd=d;best=p;}}
        if(best) RTS.moveArmy(world,army.id,best.x,best.y+((army.id%2)?34:-34)); }
    }
  }
  // 진격: 필드 부대는 최근접 아군 성으로
  for(const a of world.armies){ if(a.team!=='enemy'||a._r||a.morale<25)continue;
    const g=a.members.find(m=>m.gen&&m.alive&&!m.gone); if(!g)continue;
    let best=null,bd=Infinity; for(const c of pc){const d=(c.x-g.x)**2+(c.y-g.y)**2; if(d<bd){bd=d;best=c;}}
    if(best) RTS.moveArmy(world,a.id,best.x+(Math.random()*50-25),best.y+((a.id%2)?34:-34));
  }
  // 야간 숙영: 전선에서 먼 적 부대는 밤에 숙영해 피로 회복(→ 아군 야습 표적). 낮엔 기상.
  for(const a of world.armies){ if(a.team!=='enemy'||a._merged||a._r||a.confused)continue;
    const g=a.members.find(m=>m.gen&&m.alive&&!m.gone); if(!g)continue;
    let near=Infinity; for(const c of world.castles)if(c.owner==='player'){const d=(c.x-g.x)**2+(c.y-g.y)**2; if(d<near)near=d;}
    if(world.night && near>320*320 && !a._engaged){ if(!a.camp)RTS.setCamp(world,a.id,true); }
    else if(a.camp && !world.night){ RTS.setCamp(world,a.id,false); }
  }
}
function loop(ts){
  if(state!=='play')return;
  const dt=Math.min((ts-last)/1000||0,0.05); last=ts;
  if(world.duelRequest){ if(!duelOpen) openDuel(world.duelRequest); }   // 일기토 발생 → 턴제 모달(전쟁 정지)
  else if(!paused&&!sortieOpen){ enemyAI(dt*speed); for(let i=0;i<speed&&!world.winner&&!world.duelRequest;i++) RTS.step(world,dt); }
  panStep(dt); stepScreenFx(dt); render();
  if(world.winner)return finish();
  requestAnimationFrame(loop);
}

function bustCanvas(side,troop,def){ makeBust(side,troop,def); return bustCv[bustKey(side,troop,def)]; }   // 캔버스 직접 그리기용
function makeBust(side,troop,def){
  const key=bustKey(side,troop,def); if(bustCache[key])return bustCache[key];

  const tcMain=COL[team]['기병'], tcDark=darken(tcMain,.5);

  const c=document.createElement('canvas'); c.width=16;c.height=16; const g=c.getContext('2d');
  const P=(x,y,col)=>{g.fillStyle=col;g.fillRect(x,y,1,1);}; const box=(x0,y0,x1,y1,col)=>{for(let y=y0;y<=y1;y++)for(let x=x0;x<=x1;x++)P(x,y,col);};
  box(2,11,13,15,armorD); box(3,12,12,15,armor); box(3,12,6,13,armorL);                     // 갑옷(장비 색)
  box(6,10,9,11,skd); box(5,5,10,10,sk); box(9,6,10,10,skd); P(6,7,o); P(9,7,o);              // 얼굴+눈
  if(L&&L.beard===1){ P(5,10,'#3a2a18');P(6,10,'#3a2a18');P(9,10,'#3a2a18');P(10,10,'#3a2a18'); } else if(L&&L.beard===2){ box(5,10,10,11,'#3a2a18'); }  // 수염
  box(4,3,11,5,tcDark); box(5,3,10,4,tcMain); box(4,5,11,5,tcDark);                           // 투구(팀)
  const pl=L?L.plume:lighten(tcMain,.5); P(7,1,pl); P(8,1,pl); P(7,2,pl); P(8,2,pl);          // 볏(고유색)
  if(troop==='창병'){ for(let y=2;y<=14;y++)P(13,y,wood); P(13,1,metal); }                     // 병종 무기 힌트
  else if(troop==='궁병'){ P(13,4,wood);P(14,5,wood);P(14,6,wood);P(14,7,wood);P(14,8,wood);P(13,9,wood); }
  else if(troop==='기병'){ box(10,14,14,15,'#2a1e12'); box(11,13,13,13,'#3a2a16'); }

}

  if(pick){ selected=pick.id; fillOfficer(pick); render(); return; }
  // 아군 성 클릭(성벽 진영 전체 영역) → 부대 선택 중이면 귀환(재입성) 명령, 아니면 출진 편성 팝업
  for(const c of world.castles){ if(c.owner!=='player')continue; if(Math.abs(wx-c.x)<=CENC.w/2 && Math.abs(wy-c.y)<=CENC.h/2){
    if(selected!==null && RTS.armyOf(world,selected) && !RTS.armyOf(world,selected)._merged){ commandArmy(selected,c.x,c.y); render(); }
    else openSortie(c.id);
    return; } }
  // 선택된 부대 이동 명령
  if(selected!==null){ commandArmy(selected,wx,wy); render(); }
});
window.addEventListener('keydown',(e)=>{ keys[e.key]=true;
  if((e.key==='c'||e.key==='C')&&selected!=null){ const a=RTS.armyOf(world,selected); if(a&&!a._merged){ RTS.setCamp(world,selected,!a.camp); updateCampBtn(); } }
});
window.addEventListener('keyup',(e)=>{ keys[e.key]=false; });
cv.addEventListener('mousemove',(e)=>{ const {x,y}=evPos(e), M=40; edge.x=x<M?-1:x>VW-M?1:0; edge.y=y<M?-1:y>VH-M?1:0; });
cv.addEventListener('mouseleave',()=>{ edge.x=edge.y=0; });
$('speedBtn').onclick=()=>{ speed=speed===1?2:speed===2?4:1; $('speedBtn').textContent=`▶ ${speed}x`; };
$('pauseBtn').onclick=()=>{ paused=!paused; $('pauseBtn').textContent=paused?'▶':'⏸'; };
$('muteBtn').onclick=()=>{ AU.resume(); $('muteBtn').textContent=AU.toggle()?'🔊':'🔇'; };
$('campBtn').onclick=()=>{ if(selected==null)return; const a=RTS.armyOf(world,selected); if(!a||a._merged)return; RTS.setCamp(world,selected,!a.camp); updateCampBtn(); render(); };
$('soForm').onclick=()=>{ sortieForm=FORMS[(FORMS.indexOf(sortieForm)+1)%FORMS.length]; $('soForm').textContent=sortieForm; sortieFormHint(); };
$('soDots').oninput=updateSortieUI;
$('soClose').onclick=closeSortie;
$('soEquip').onclick=()=>openEquip(genById(sortieGen));
$('eqClose').onclick=closeEquip;
$('soGo').onclick=()=>{
  if(window.Meta && !Meta.spendEnergy(1)){ screenFx({flash:[200,80,60],fdur:0.3,text:'에너지 부족',sub:'행동력이 회복될 때까지 기다리세요',color:'#ff9a6a',tdur:1.6}); return; }
  const d=+$('soDots').value, army=RTS.sortie(world,sortieCastle,sortieGen,d,sortieForm);
  if(army){ closeSortie(); buildRoster(); selected=army.id; fillOfficer(army); updateEnergyHud();
    AU.horn(); screenFx({flash:[232,200,115],fdur:0.28,text:army.gen.name+' 出陣!',sub:sortieForm+' · 병력 '+(d*100).toLocaleString(),color:'#ffe07a',tdur:1.5});
    const g=army.members.find(m=>m.gen); if(g){ cam.x=Math.max(0,Math.min(MAPW-VW,g.x-VW/2)); cam.y=Math.max(0,Math.min(MAPH-VH,g.y-VH/2)); } render(); }
  else if(window.Meta){ Meta.addEnergy(1); updateEnergyHud(); } };

// ── 턴제 일기토 (engine.js 구동, 전쟁 중 발동) ────────────
let duelOpen=false, dBattle=null, dOrder=[], dIdx=0, dReq=null;
function openDuel(req){
  dReq=req; duelOpen=true;
  const pSol=req.a.team==='player'?req.a:req.b, eSol=req.a.team==='player'?req.b:req.a;
  req._pSol=pSol; req._eSol=eSol;
  const pDef=genById(pSol.id), eDef=genById(eSol.id);
  dBattle=Engine.createBattle({player:[pDef],enemy:[eDef]},{seed:((performance.now()*1000)|0)^((pSol.x*13+eSol.y*7)|0),maxRounds:30});
  dBattle.strategy.enemy=Engine.aiChooseAction;
  dBattle.round=1; dOrder=Engine.computeOrder(dBattle); dIdx=0;
  $('duelResult').style.display='none'; $('duelOv').classList.add('show'); AU.duel();
  renderDuel(); duelAdvance();
}
function duelHead(side,f,morale,rout){
  const el=$(side==='p'?'dfP':'dfE'), def=genById(f.id), hpP=Math.max(0,f.hp/f.maxHp*100);
  const st=f.statuses.map(s=>s.type).join(' ');
  el.innerHTML=`<div class="dpor ${side==='p'?'pp':'ee'}"><img src="${makeBust(side,f.troop,def)}"></div>
    <div class="dnm" style="color:${side==='p'?'#bcd8ff':'#ffc4c4'}">${f.name}</div>
    <div class="dmeta">${f.faction||''} · ${f.troop} · 武${f.might}</div>
    <div class="dbar"><div class="dhp" style="width:${hpP}%;background:${side==='p'?'#5a94e0':'#df6060'}"></div></div>
    <div class="dnum">${Math.max(0,f.hp)|0} / ${f.maxHp}</div>
    <div class="dmor">사기 ${Math.round(morale)}${rout?' <b style="color:#e05050">붕괴</b>':''}</div>${st?`<div class="dstat">${st}</div>`:''}`;
}
function renderDuel(){
  duelHead('p',dBattle.teams.player[0],dBattle.morale.player,dBattle.rout.player);
  duelHead('e',dBattle.teams.enemy[0],dBattle.morale.enemy,dBattle.rout.enemy);
  const box=$('duelLog'), L=dBattle.log.slice(-7);
  box.innerHTML=L.map(e=>`<div class="lg ${e.kind}">${e.msg}</div>`).join(''); box.scrollTop=box.scrollHeight;
}
function showDuelActions(actor){
  const box=$('duelActs'); box.style.display='flex';
  const acts=[{t:'공격',on:1,d:'무력 타격'},{t:'방어',on:1,d:'피해½·사기+3'},
    {t:'스킬',on:actor.cd.skill===0&&actor.skill,d:actor.skill||'없음'},
    {t:'책략',on:actor.cd.stratagem===0&&actor.stratagem,d:actor.stratagem||'없음'},
    {t:'사기고양',on:actor.cd.rally===0,d:'사기+20'}];
  box.innerHTML='';
  for(const a of acts){ const b=document.createElement('button'); b.className='dbtn'+(a.on?'':' dis');
    b.innerHTML=`<b>${a.t}</b><small>${a.d}</small>`; if(a.on)b.onclick=()=>playerAct(a.t); box.appendChild(b); }
}
function hideDuelActions(){ $('duelActs').style.display='none'; }
function playerAct(type){
  const actor=dOrder[dIdx]; if(!actor||actor.team!=='player'||!actor.alive)return;
  const foe=Engine.aliveOf(dBattle,'enemy')[0];
  dBattle.strategy.player=()=>({type,target:foe});
  hideDuelActions(); Engine.takeTurn(dBattle,actor); dIdx++; renderDuel();
  const v=Engine.checkVictory(dBattle); if(v)return duelFinish(v);
  setTimeout(duelAdvance,450);
}
function duelAdvance(){
  while(dIdx<dOrder.length){
    const actor=dOrder[dIdx];
    if(!actor.alive){ dIdx++; continue; }
    if(actor.team==='enemy'){ Engine.takeTurn(dBattle,actor); dIdx++; renderDuel();
      const v=Engine.checkVictory(dBattle); if(v)return duelFinish(v);
      setTimeout(duelAdvance,600); return;
    } else { renderDuel(); showDuelActions(actor); return; }
  }
  Engine.endRound(dBattle);
  const v=Engine.checkVictory(dBattle); if(v)return duelFinish(v);
  if(dBattle.round>=dBattle.maxRounds)return duelFinish(Engine.judgeTimeout(dBattle));
  dBattle.round++; dOrder=Engine.computeOrder(dBattle); dIdx=0; renderDuel();
  setTimeout(duelAdvance,450);
}
function duelFinish(result){
  hideDuelActions(); renderDuel();
  const pWon=result.winner==='player', pSol=dReq._pSol, eSol=dReq._eSol;
  const winner=pWon?pSol:eSol, loser=pWon?eSol:pSol;
  const loserF=pWon?dBattle.teams.enemy[0]:dBattle.teams.player[0], killed=!loserF.alive;
  const box=$('duelResult'); box.style.display='block';
  box.innerHTML=`<div class="drwin" style="color:${pWon?'#7fe89a':'#e06868'}">${pWon?'勝 · 승리':'敗 · 패배'}</div>
    <div class="drsub">${result.grade} · ${result.rounds}합 · ${killed?(pWon?'적장 격파! 부대 와해':'아군 장수 전사'):(pWon?'적장 후퇴시킴':'아군 후퇴')}</div>
    <button class="btn" id="duelCloseBtn">확 인</button>`;
  $('duelCloseBtn').onclick=()=>{
    RTS.applyDuelResult(world,winner,loser,killed);
    $('duelOv').classList.remove('show'); duelOpen=false; dBattle=null;
    if(pWon){AU.win(); screenFx({flash:[232,200,115],fdur:0.3,text:winner.genName+' 一騎討 勝!',sub:killed?'적장을 벤다':'적장을 물리쳤다',color:'#ffe07a',tdur:1.5});}
    else{AU.boom(); screenFx({flash:[200,60,50],fdur:0.35,shake:10,text:loser.genName+' 敗北',sub:killed?'장수를 잃었다':'후퇴한다',color:'#ff8a6a',tdur:1.5});}
    render();
  };
}

function init(){ resize(); newWorld(); buildRoster(); render(); updateEnergyHud(); setInterval(updateEnergyHud,1000); last=performance.now(); requestAnimationFrame(loop); }
window.addEventListener('resize',()=>{ resize(); render(); });
init();
</script>
